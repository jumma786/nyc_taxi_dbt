name: dbt CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install dbt-duckdb

      - name: Download data (3 months)
        run: python scripts/download_data.py --year 2024 --months 1 2 3

      - name: dbt deps
        run: dbt deps --profiles-dir .

      - name: dbt build
        run: dbt build --profiles-dir .
